services:
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: user:1.0.0
    container_name: user
    depends_on:
      - redis
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user

  redis:
    image: redis:7.0
    container_name: redis
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: mongodb:1.0.0
    container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true then it will use existing network if false then it will create new network with name roboshop

