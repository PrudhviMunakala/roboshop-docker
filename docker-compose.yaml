services:
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb
  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    image: cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - shipping
      - cart
      - payment

  redis:
    image: redis:7.0
    container_name: redis
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: mongodb:1.0.0
    container_name: mongodb
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: mysql:1.0.0
    container_name: mysql
  
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
     RABBITMQ_DEFAULT_USER: "roboshop"
     RABBITMQ_DEFAULT_PASS: "Roboshop123"
  shipping:
    build:
      context: ./shipping
      dockerfile: Dockerfile
    image: shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
      - cart
  payment:
    build:
      context: ./payment
      dockerfile: Dockerfile
    image: payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASSWORD: "Roboshop123"
    depends_on:
      - rabbitmq
      - cart
      - user
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true then it will use existing network if false then it will create new network with name roboshop

